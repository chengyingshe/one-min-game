<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Sky gradient - sunset -->
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4a7090" />
      <stop offset="30%" stop-color="#c88060" />
      <stop offset="55%" stop-color="#e8a860" />
      <stop offset="75%" stop-color="#f0c870" />
      <stop offset="100%" stop-color="#d8b860" />
    </linearGradient>
    <!-- Water gradient -->
    <linearGradient id="waterGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c8b878" />
      <stop offset="30%" stop-color="#a0c8d0" />
      <stop offset="70%" stop-color="#70a0b8" />
      <stop offset="100%" stop-color="#508090" />
    </linearGradient>
    <!-- Sun -->
    <radialGradient id="sunDisk" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff8d0" />
      <stop offset="30%" stop-color="#ffe880" />
      <stop offset="60%" stop-color="#ffc040" />
      <stop offset="100%" stop-color="#e89030" />
    </radialGradient>
    <!-- Sun reflection on water -->
    <radialGradient id="sunReflect" cx="50%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#ffe880" stop-opacity="0.5" />
      <stop offset="40%" stop-color="#ffc040" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#ffc040" stop-opacity="0" />
    </radialGradient>
    <!-- Warm haze -->
    <linearGradient id="warmHaze" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffc060" stop-opacity="0.1" />
      <stop offset="50%" stop-color="#e8a040" stop-opacity="0.05" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </linearGradient>
    <!-- Willow canopy -->
    <radialGradient id="willowCanopy" cx="50%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#6a9a4a" />
      <stop offset="60%" stop-color="#4a7a3a" />
      <stop offset="100%" stop-color="#3a5a2a" />
    </radialGradient>
  </defs>

  <!-- Sky -->
  <rect x="0" y="0" width="1600" height="520" fill="url(#skyGrad)" />

  <!-- Sun -->
  <circle cx="1050" cy="320" r="45" fill="url(#sunDisk)" />
  <circle cx="1050" cy="320" r="55" fill="#ffe880" opacity="0.2" />
  <circle cx="1050" cy="320" r="75" fill="#ffe880" opacity="0.1" />

  <!-- Distant mountains silhouette -->
  <path d="M0,420 L180,340 L320,380 L500,310 L680,360 L850,330 L1000,370 L1150,320 L1350,360 L1500,330 L1600,380 L1600,520 L0,520 Z" fill="#7a8a70" opacity="0.4" />
  <path d="M0,450 L200,400 L400,430 L600,380 L800,410 L950,390 L1100,420 L1300,380 L1600,410 L1600,520 L0,520 Z" fill="#6a7a60" opacity="0.35" />

  <!-- Far riverbank -->
  <path d="M0,490 Q300,470 600,485 Q800,495 1000,480 Q1300,470 1600,490 L1600,530 L0,530 Z" fill="#5a7a3a" opacity="0.6" />

  <!-- Water body -->
  <rect x="0" y="510" width="1600" height="200" fill="url(#waterGrad)" />

  <!-- Sun reflection on water -->
  <ellipse cx="1050" cy="540" rx="80" ry="80" fill="url(#sunReflect)" />
  <!-- Water ripple lines -->
  <g stroke="#d8c888" stroke-width="0.8" opacity="0.3" fill="none">
    <path d="M980,530 Q1015,528 1050,530 Q1085,532 1120,530" />
    <path d="M970,540 Q1015,537 1050,540 Q1085,543 1130,540" />
    <path d="M960,550 Q1015,546 1050,550 Q1085,554 1140,550" />
    <path d="M955,560 Q1015,555 1050,560 Q1085,565 1145,560" />
    <path d="M960,570 Q1015,565 1050,570 Q1085,575 1140,570" />
  </g>

  <!-- Far riverbank with reeds -->
  <path d="M0,510 Q200,500 400,510 Q600,518 800,510 Q1000,505 1200,512 Q1400,518 1600,510 L1600,530 L0,530 Z" fill="#4a6a3a" />

  <!-- Reeds on far bank -->
  <g stroke="#5a7a3a" stroke-width="1.5" fill="none" opacity="0.5">
    <line x1="100" y1="515" x2="95" y2="480" />
    <line x1="95" y1="490" x2="90" y2="485" />
    <line x1="250" y1="512" x2="245" y2="475" />
    <line x1="400" y1="513" x2="395" y2="478" />
    <line x1="600" y1="516" x2="595" y2="482" />
    <line x1="750" y1="514" x2="745" y2="479" />
  </g>

  <!-- Stone arch bridge in middle distance -->
  <g>
    <!-- Bridge arch -->
    <path d="M680,510 Q800,430 920,510" fill="none" stroke="#a09880" stroke-width="12" />
    <path d="M680,510 Q800,435 920,510" fill="none" stroke="#b0a890" stroke-width="8" />
    <!-- Bridge top -->
    <path d="M670,510 Q800,425 930,510 L930,520 Q800,440 670,520 Z" fill="#a09880" />
    <!-- Stone details -->
    <g fill="none" stroke="#908878" stroke-width="0.5" opacity="0.5">
      <line x1="700" y1="505" x2="700" y2="515" />
      <line x1="740" y1="480" x2="740" y2="492" />
      <line x1="800" y1="465" x2="800" y2="478" />
      <line x1="860" y1="480" x2="860" y2="492" />
      <line x1="900" y1="505" x2="900" y2="515" />
    </g>
    <!-- Bridge reflection -->
    <path d="M680,520 Q800,590 920,520" fill="none" stroke="#a09880" stroke-width="6" opacity="0.2" />
  </g>

  <!-- Near riverbank (left side) -->
  <path d="M0,580 Q100,560 200,590 Q300,610 350,650 Q380,700 350,800 L0,900 Z" fill="#4a6a2a" />
  <path d="M0,590 Q80,575 160,600 Q240,620 280,650 Q300,680 280,750 L0,800 Z" fill="#5a7a3a" />

  <!-- Near riverbank (right side) -->
  <path d="M1600,600 Q1500,580 1400,610 Q1300,630 1250,670 Q1200,720 1250,850 L1600,900 Z" fill="#4a6a2a" />
  <path d="M1600,610 Q1520,590 1440,620 Q1360,640 1320,670 Q1300,690 1320,760 L1600,810 Z" fill="#5a7a3a" />

  <!-- Willow tree on left bank -->
  <g>
    <!-- Trunk -->
    <path d="M200,480 Q195,400 180,320 Q175,280 190,240" fill="none" stroke="#5a4a30" stroke-width="16" stroke-linecap="round" />
    <path d="M200,480 Q205,410 200,340 Q195,300 180,270" fill="none" stroke="#6a5a40" stroke-width="10" />
    <!-- Branch structure -->
    <path d="M190,300 Q150,280 120,300" fill="none" stroke="#5a4a30" stroke-width="6" />
    <path d="M185,270 Q140,250 100,240" fill="none" stroke="#5a4a30" stroke-width="5" />
    <path d="M188,310 Q160,320 130,340" fill="none" stroke="#5a4a30" stroke-width="5" />
    <path d="M192,260 Q210,240 240,230" fill="none" stroke="#5a4a30" stroke-width="5" />
    <path d="M195,330 Q220,340 250,350" fill="none" stroke="#5a4a30" stroke-width="4" />

    <!-- Weeping willow branches -->
    <g fill="none" stroke-linecap="round">
      <!-- From left branch -->
      <path d="M120,300 Q115,340 110,400 Q108,430 112,470" stroke="#4a7a2a" stroke-width="2" />
      <path d="M125,305 Q118,360 115,420 Q113,460 118,490" stroke="#5a8a3a" stroke-width="2" />
      <path d="M115,295 Q100,350 95,410 Q92,460 98,510" stroke="#4a7a2a" stroke-width="1.5" />

      <!-- From top-left branches -->
      <path d="M100,240 Q90,310 85,380 Q82,440 88,490" stroke="#5a8a3a" stroke-width="1.5" />
      <path d="M105,245 Q100,330 95,400 Q92,460 98,520" stroke="#4a7a2a" stroke-width="2" />
      <path d="M95,250 Q80,350 70,420 Q68,480 72,530" stroke="#6a9a4a" stroke-width="1.5" />

      <!-- From top-right branches -->
      <path d="M240,230 Q255,300 260,380 Q262,430 258,480" stroke="#5a8a3a" stroke-width="1.5" />
      <path d="M245,235 Q270,320 275,400 Q278,450 272,500" stroke="#4a7a2a" stroke-width="2" />

      <!-- From right branch -->
      <path d="M250,350 Q265,400 270,450 Q272,480 268,510" stroke="#4a7a2a" stroke-width="1.5" />
      <path d="M245,345 Q258,390 260,430 Q262,460 258,490" stroke="#5a8a3a" stroke-width="1.5" />

      <!-- From center -->
      <path d="M190,280 Q185,350 180,420 Q178,470 182,520" stroke="#5a8a3a" stroke-width="1.5" />
      <path d="M195,290 Q200,370 205,440 Q208,490 202,540" stroke="#4a7a2a" stroke-width="1.5" />
    </g>

    <!-- Leaf clusters -->
    <g opacity="0.6">
      <ellipse cx="100" cy="250" rx="35" ry="20" fill="#5a8a3a" />
      <ellipse cx="140" cy="260" rx="30" ry="18" fill="#6a9a4a" />
      <ellipse cx="180" cy="240" rx="35" ry="22" fill="#4a7a2a" />
      <ellipse cx="230" cy="250" rx="30" ry="18" fill="#5a8a3a" />
      <ellipse cx="120" cy="300" rx="40" ry="22" fill="#6a9a4a" />
      <ellipse cx="220" cy="290" rx="35" ry="20" fill="#4a7a2a" />
    </g>
  </g>

  <!-- Wildflowers on left bank -->
  <g opacity="0.7">
    <circle cx="50" cy="610" r="3" fill="#e8b0c0" />
    <circle cx="70" cy="615" r="2.5" fill="#d0a0b0" />
    <circle cx="90" cy="605" r="3" fill="#e8b0c0" />
    <circle cx="120" cy="620" r="2.5" fill="#f0c0d0" />
    <circle cx="150" cy="615" r="3" fill="#d0a0b0" />
    <circle cx="180" cy="625" r="2.5" fill="#e8b0c0" />
    <circle cx="220" cy="630" r="3" fill="#f0c0d0" />
    <circle cx="260" cy="640" r="2.5" fill="#d0a0b0" />
  </g>

  <!-- Reeds on right bank -->
  <g stroke="#4a6a2a" stroke-width="1.5" fill="none" opacity="0.6">
    <line x1="1350" y1="640" x2="1350" y2="590" />
    <ellipse cx="1350" cy="590" rx="3" ry="1.5" fill="#6a8a4a" />
    <line x1="1380" y1="635" x2="1380" y2="585" />
    <ellipse cx="1380" cy="585" rx="3" ry="1.5" fill="#6a8a4a" />
    <line x1="1410" y1="645" x2="1410" y2="595" />
    <ellipse cx="1410" cy="595" rx="3" ry="1.5" fill="#6a8a4a" />
    <line x1="1440" y1="640" x2="1440" y2="588" />
    <ellipse cx="1440" cy="588" rx="3" ry="1.5" fill="#6a8a4a" />
    <line x1="1470" y1="650" x2="1470" y2="600" />
    <ellipse cx="1470" cy="600" rx="3" ry="1.5" fill="#6a8a4a" />
  </g>

  <!-- Foreground grass/bank -->
  <path d="M0,700 Q100,680 200,710 Q300,730 350,750 Q380,780 350,850 L0,900 Z" fill="#3a5a1a" opacity="0.5" />
  <path d="M1600,680 Q1500,670 1400,690 Q1300,710 1250,730 Q1200,760 1250,830 L1600,900 Z" fill="#3a5a1a" opacity="0.5" />

  <!-- Warm atmosphere overlay -->
  <rect x="0" y="0" width="1600" height="900" fill="url(#warmHaze)" />

  <!-- Vignette -->
  <rect x="0" y="0" width="1600" height="900" fill="none" stroke="#3a2010" stroke-width="80" opacity="0.25" />
</svg>