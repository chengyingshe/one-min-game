<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Sky gradient -->
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#87CEEB" />
      <stop offset="40%" stop-color="#f0d5a0" />
      <stop offset="70%" stop-color="#e8a860" />
      <stop offset="100%" stop-color="#d08050" />
    </linearGradient>
    <!-- Mountain gradient -->
    <linearGradient id="mtnGrad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8b9db0" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#6b7d90" stop-opacity="0.3" />
    </linearGradient>
    <linearGradient id="mtnGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7b8da0" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#5b6d80" stop-opacity="0.2" />
    </linearGradient>
    <!-- Ground gradient -->
    <linearGradient id="groundGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c4a87a" />
      <stop offset="100%" stop-color="#a08860" />
    </linearGradient>
    <!-- Lantern glow -->
    <radialGradient id="lanternGlow">
      <stop offset="0%" stop-color="#ff6644" stop-opacity="0.6" />
      <stop offset="40%" stop-color="#ff4422" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#ff2200" stop-opacity="0" />
    </radialGradient>
    <!-- Sun glow -->
    <radialGradient id="sunGlow" cx="70%" cy="40%" r="30%">
      <stop offset="0%" stop-color="#ffe8a0" stop-opacity="0.4" />
      <stop offset="50%" stop-color="#ffc060" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </radialGradient>
    <!-- Awning gradient -->
    <linearGradient id="awningGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c43a31" />
      <stop offset="100%" stop-color="#8b1a1a" />
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect x="0" y="0" width="1600" height="550" fill="url(#skyGrad)" />

  <!-- Distant mountains -->
  <path d="M0,350 L200,200 L400,280 L600,180 L800,300 L950,220 L1100,310 L1300,200 L1450,270 L1600,230 L1600,600 L0,600 Z" fill="url(#mtnGrad1)" />
  <path d="M0,380 L300,260 L500,330 L700,250 L900,350 L1050,280 L1200,340 L1400,260 L1600,320 L1600,600 L0,600 Z" fill="url(#mtnGrad2)" />

  <!-- Sun glow overlay -->
  <ellipse cx="1200" cy="400" rx="400" ry="300" fill="url(#sunGlow)" />

  <!-- Ground / cobblestone path -->
  <rect x="0" y="450" width="1600" height="450" fill="url(#groundGrad)" />

  <!-- Cobblestone path (center, perspective) -->
  <polygon points="600,520 1000,520 1200,900 400,900" fill="#a09878" />
  <!-- Cobblestone details -->
  <g fill="none" stroke="#908868" stroke-width="1" opacity="0.4">
    <path d="M680,550 Q720,560 780,555 Q840,560 920,550" />
    <path d="M640,620 Q700,630 800,625 Q900,635 960,620" />
    <path d="M580,710 Q680,720 800,715 Q920,725 1020,710" />
    <path d="M500,820 Q650,835 800,825 Q950,840 1100,820" />
    <!-- Individual cobblestone outlines -->
    <ellipse cx="720" cy="570" rx="40" ry="12" />
    <ellipse cx="840" cy="580" rx="35" ry="10" />
    <ellipse cx="760" cy="640" rx="45" ry="14" />
    <ellipse cx="680" cy="700" rx="50" ry="15" />
    <ellipse cx="880" cy="710" rx="42" ry="13" />
    <ellipse cx="780" cy="780" rx="55" ry="16" />
  </g>

  <!-- Left vendor stall -->
  <g>
    <!-- Stall structure -->
    <rect x="100" y="480" width="350" height="10" fill="#6B5010" />
    <rect x="100" y="490" width="10" height="80" fill="#5a4010" />
    <rect x="440" y="490" width="10" height="80" fill="#5a4010" />
    <!-- Table top -->
    <rect x="80" y="570" width="400" height="15" rx="3" fill="#8B6914" />
    <rect x="80" y="585" width="12" height="60" fill="#5a4010" />
    <rect x="468" y="585" width="12" height="60" fill="#5a4010" />
    <!-- Awning -->
    <polygon points="60,440 460,440 470,490 50,490" fill="url(#awningGrad)" />
    <polygon points="60,440 260,410 460,440" fill="#d44a4a" />
    <!-- Awning stripes -->
    <g stroke="#a02020" stroke-width="1" opacity="0.3">
      <line x1="140" y1="445" x2="130" y2="490" />
      <line x1="220" y1="420" x2="210" y2="490" />
      <line x1="300" y1="420" x2="290" y2="490" />
      <line x1="380" y1="445" x2="370" y2="490" />
    </g>
    <!-- Goods on table: pottery -->
    <ellipse cx="140" cy="560" rx="18" ry="12" fill="#c48860" />
    <ellipse cx="140" cy="555" rx="12" ry="8" fill="#d49870" />
    <ellipse cx="190" cy="562" rx="14" ry="10" fill="#a07050" />
    <ellipse cx="190" cy="556" rx="10" ry="6" fill="#b08060" />
    <ellipse cx="230" cy="558" rx="16" ry="11" fill="#886048" />
    <!-- Cloth rolls -->
    <rect x="290" y="550" width="30" height="20" rx="3" fill="#4a90b8" />
    <rect x="330" y="552" width="30" height="18" rx="3" fill="#5a8a50" />
    <rect x="370" y="548" width="30" height="22" rx="3" fill="#8a4a4a" />
  </g>

  <!-- Right vendor stall -->
  <g>
    <rect x="1100" y="500" width="350" height="10" fill="#6B5010" />
    <rect x="1100" y="510" width="10" height="60" fill="#5a4010" />
    <rect x="1440" y="510" width="10" height="60" fill="#5a4010" />
    <rect x="1080" y="570" width="400" height="15" rx="3" fill="#8B6914" />
    <rect x="1080" y="585" width="12" height="50" fill="#5a4010" />
    <rect x="1468" y="585" width="12" height="50" fill="#5a4010" />
    <!-- Awning -->
    <polygon points="1060,460 1460,460 1470,510 1050,510" fill="#c43a31" />
    <polygon points="1060,460 1260,430 1460,460" fill="#d44a4a" />
    <!-- Herbs hanging -->
    <g fill="#5a7a3a" opacity="0.7">
      <rect x="1150" y="510" width="6" height="30" rx="2" />
      <rect x="1160" y="515" width="5" height="25" rx="2" />
      <rect x="1170" y="512" width="6" height="28" rx="2" />
    </g>
    <!-- Goods: herbs in baskets -->
    <ellipse cx="1140" cy="562" rx="22" ry="8" fill="#6b5a30" />
    <ellipse cx="1140" cy="558" rx="18" ry="6" fill="#7a6a40" />
    <ellipse cx="1220" cy="560" rx="18" ry="7" fill="#5a4a20" />
    <ellipse cx="1220" cy="555" rx="14" ry="5" fill="#6a5a30" />
    <!-- Fabrics -->
    <rect x="1300" y="550" width="35" height="20" rx="3" fill="#c88040" />
    <rect x="1345" y="548" width="28" height="22" rx="3" fill="#4a6080" />
  </g>

  <!-- Lanterns hanging above -->
  <g>
    <!-- Left lantern -->
    <line x1="300" y1="440" x2="300" y2="460" stroke="#4a3010" stroke-width="1.5" />
    <ellipse cx="300" cy="480" rx="20" ry="24" fill="#c43a31" />
    <ellipse cx="300" cy="480" rx="20" ry="24" fill="none" stroke="#e06050" stroke-width="0.5" />
    <rect x="292" y="458" width="16" height="6" rx="2" fill="#8B6914" />
    <rect x="288" y="502" width="24" height="4" rx="1" fill="#8B6914" />
    <circle cx="300" cy="480" r="28" fill="url(#lanternGlow)" />
    <!-- Tassel -->
    <line x1="300" y1="506" x2="300" y2="520" stroke="#c43a31" stroke-width="1" />
    <ellipse cx="300" cy="522" rx="4" ry="6" fill="#c43a31" />
  </g>

  <g>
    <!-- Center lantern -->
    <line x1="800" y1="440" x2="800" y2="460" stroke="#4a3010" stroke-width="1.5" />
    <ellipse cx="800" cy="480" rx="22" ry="26" fill="#c43a31" />
    <ellipse cx="800" cy="480" rx="22" ry="26" fill="none" stroke="#e06050" stroke-width="0.5" />
    <rect x="791" y="456" width="18" height="6" rx="2" fill="#8B6914" />
    <rect x="787" y="504" width="26" height="4" rx="1" fill="#8B6914" />
    <circle cx="800" cy="480" r="32" fill="url(#lanternGlow)" />
    <line x1="800" y1="508" x2="800" y2="524" stroke="#c43a31" stroke-width="1" />
    <ellipse cx="800" cy="526" rx="5" ry="7" fill="#c43a31" />
  </g>

  <g>
    <!-- Right lantern -->
    <line x1="1300" y1="440" x2="1300" y2="460" stroke="#4a3010" stroke-width="1.5" />
    <ellipse cx="1300" cy="480" rx="20" ry="24" fill="#c43a31" />
    <ellipse cx="1300" cy="480" rx="20" ry="24" fill="none" stroke="#e06050" stroke-width="0.5" />
    <rect x="1292" y="458" width="16" height="6" rx="2" fill="#8B6914" />
    <rect x="1288" y="502" width="24" height="4" rx="1" fill="#8B6914" />
    <circle cx="1300" cy="480" r="28" fill="url(#lanternGlow)" />
    <line x1="1300" y1="506" x2="1300" y2="520" stroke="#c43a31" stroke-width="1" />
    <ellipse cx="1300" cy="522" rx="4" ry="6" fill="#c43a31" />
  </g>

  <!-- Wooden beams overhead (supporting lanterns) -->
  <line x1="200" y1="440" x2="1400" y2="440" stroke="#5a3810" stroke-width="4" opacity="0.5" />
  <rect x="250" y="435" width="30" height="20" fill="#4a2c10" opacity="0.4" />
  <rect x="750" y="435" width="30" height="20" fill="#4a2c10" opacity="0.4" />
  <rect x="1250" y="435" width="30" height="20" fill="#4a2c10" opacity="0.4" />

  <!-- Warm atmospheric overlay -->
  <rect x="0" y="0" width="1600" height="900" fill="#c86020" opacity="0.05" />

  <!-- Vignette -->
  <rect x="0" y="0" width="1600" height="900" fill="none" stroke="#2c1408" stroke-width="100" opacity="0.35" />
</svg>