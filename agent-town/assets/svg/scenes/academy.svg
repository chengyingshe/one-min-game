<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Wall gradient - cool toned -->
    <linearGradient id="wallGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d4d0c8" />
      <stop offset="50%" stop-color="#c8c4b8" />
      <stop offset="100%" stop-color="#b0a898" />
    </linearGradient>
    <!-- Floor -->
    <linearGradient id="floorGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8b7d6a" />
      <stop offset="100%" stop-color="#6b5d4a" />
    </linearGradient>
    <!-- Sunbeam -->
    <linearGradient id="sunbeam1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe8a0" stop-opacity="0.25" />
      <stop offset="50%" stop-color="#ffe8a0" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#ffe8a0" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="sunbeam2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe8a0" stop-opacity="0.15" />
      <stop offset="60%" stop-color="#ffe8a0" stop-opacity="0.05" />
      <stop offset="100%" stop-color="#ffe8a0" stop-opacity="0" />
    </linearGradient>
    <!-- Desk wood -->
    <linearGradient id="deskWood" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6b5040" />
      <stop offset="100%" stop-color="#4a3020" />
    </linearGradient>
    <!-- Bookshelf wood -->
    <linearGradient id="shelfWood" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5a3e2e" />
      <stop offset="100%" stop-color="#3a1e0e" />
    </linearGradient>
    <!-- Window glow -->
    <linearGradient id="windowGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff8e0" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#e0d8c0" stop-opacity="0.2" />
    </linearGradient>
    <!-- Book colors -->
    <linearGradient id="bookBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a6a8a" />
      <stop offset="100%" stop-color="#3a5a7a" />
    </linearGradient>
    <linearGradient id="bookBrown" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8a6a4a" />
      <stop offset="100%" stop-color="#6a4a2a" />
    </linearGradient>
    <linearGradient id="bookGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5a7a5a" />
      <stop offset="100%" stop-color="#4a6a4a" />
    </linearGradient>
  </defs>

  <!-- Back wall -->
  <rect x="0" y="0" width="1600" height="600" fill="url(#wallGrad)" />

  <!-- Floor -->
  <rect x="0" y="600" width="1600" height="300" fill="url(#floorGrad)" />
  <g stroke="#5a4d3a" stroke-width="0.5" opacity="0.3">
    <line x1="0" y1="620" x2="1600" y2="620" />
    <line x1="0" y1="650" x2="1600" y2="650" />
    <line x1="0" y1="690" x2="1600" y2="690" />
    <line x1="0" y1="740" x2="1600" y2="740" />
    <line x1="0" y1="800" x2="1600" y2="800" />
  </g>

  <!-- Left window -->
  <rect x="60" y="80" width="260" height="300" rx="2" fill="#1a1a10" />
  <rect x="60" y="80" width="260" height="300" rx="2" fill="#3a3a2a" opacity="0.5" />
  <!-- Window lattice -->
  <g stroke="#7a6a4a" stroke-width="1.5" opacity="0.6">
    <line x1="60" y1="180" x2="320" y2="180" />
    <line x1="60" y1="280" x2="320" y2="280" />
    <line x1="147" y1="80" x2="147" y2="380" />
    <line x1="233" y1="80" x2="233" y2="380" />
  </g>
  <rect x="60" y="80" width="260" height="300" rx="2" fill="url(#windowGlow)" />
  <rect x="60" y="80" width="260" height="300" rx="2" fill="none" stroke="#6a5a3a" stroke-width="4" />

  <!-- Bamboo shadows on window -->
  <g opacity="0.3" fill="none" stroke="#3a4a2a" stroke-width="2">
    <line x1="100" y1="380" x2="100" y2="200" />
    <path d="M100,250 Q120,230 130,250" />
    <path d="M98,280 Q80,260 70,280" />
    <path d="M102,310 Q125,290 135,310" />
    <line x1="130" y1="380" x2="130" y2="180" />
    <path d="M130,240 Q155,220 165,240" />
    <path d="M128,270 Q110,250 100,270" />
  </g>

  <!-- Right large bookshelf -->
  <rect x="1300" y="60" width="280" height="520" fill="url(#shelfWood)" />
  <rect x="1300" y="60" width="280" height="520" fill="none" stroke="#2a1a0a" stroke-width="3" />
  <!-- Shelf dividers -->
  <rect x="1300" y="180" width="280" height="6" fill="#2a1a0a" />
  <rect x="1300" y="300" width="280" height="6" fill="#2a1a0a" />
  <rect x="1300" y="420" width="280" height="6" fill="#2a1a0a" />
  <rect x="1300" y="530" width="280" height="6" fill="#2a1a0a" />

  <!-- Books on shelf 1 -->
  <g>
    <rect x="1310" y="140" width="18" height="38" rx="1" fill="url(#bookBlue)" />
    <rect x="1332" y="145" width="14" height="33" rx="1" fill="#8a4a2a" />
    <rect x="1350" y="138" width="20" height="40" rx="1" fill="url(#bookGreen)" />
    <rect x="1375" y="142" width="12" height="36" rx="1" fill="url(#bookBrown)" />
    <rect x="1392" y="136" width="22" height="42" rx="1" fill="#6a3a4a" />
    <rect x="1420" y="144" width="16" height="34" rx="1" fill="url(#bookBlue)" />
    <rect x="1440" y="140" width="18" height="38" rx="1" fill="url(#bookBrown)" />
    <!-- Scrolls on shelf -->
    <ellipse cx="1490" cy="158" rx="6" ry="14" fill="#d4c4a0" />
    <ellipse cx="1510" cy="156" rx="5" ry="16" fill="#e0d0b0" />
    <ellipse cx="1530" cy="159" rx="7" ry="13" fill="#c8b890" />
  </g>

  <!-- Books on shelf 2 -->
  <g>
    <rect x="1310" y="260" width="20" height="38" rx="1" fill="#7a4a3a" />
    <rect x="1335" y="255" width="22" height="43" rx="1" fill="url(#bookGreen)" />
    <rect x="1362" y="262" width="14" height="36" rx="1" fill="url(#bookBlue)" />
    <rect x="1382" y="258" width="18" height="40" rx="1" fill="#9a6a3a" />
    <rect x="1405" y="256" width="16" height="42" rx="1" fill="#4a5a5a" />
    <rect x="1428" y="264" width="20" height="34" rx="1" fill="url(#bookBrown)" />
    <rect x="1455" y="260" width="14" height="38" rx="1" fill="#6a4a5a" />
    <!-- More scrolls -->
    <ellipse cx="1510" cy="278" rx="5" ry="12" fill="#d8c8a8" />
    <ellipse cx="1530" cy="277" rx="6" ry="15" fill="#c4b898" />
  </g>

  <!-- Books on shelf 3 -->
  <g>
    <rect x="1310" y="380" width="16" height="38" rx="1" fill="url(#bookBrown)" />
    <rect x="1330" y="375" width="22" height="43" rx="1" fill="url(#bookBlue)" />
    <rect x="1358" y="382" width="18" height="36" rx="1" fill="#5a4a3a" />
    <rect x="1382" y="378" width="14" height="40" rx="1" fill="url(#bookGreen)" />
    <rect x="1402" y="376" width="20" height="42" rx="1" fill="#8a5a2a" />
    <rect x="1428" y="384" width="16" height="34" rx="1" fill="url(#bookBlue)" />
  </g>

  <!-- Ground level shelf -->
  <g>
    <rect x="1310" y="498" width="22" height="32" rx="1" fill="#6a4a2a" />
    <rect x="1338" y="500" width="18" height="30" rx="1" fill="url(#bookGreen)" />
    <rect x="1362" y="496" width="20" height="34" rx="1" fill="url(#bookBrown)" />
    <!-- Large scroll stacks -->
    <ellipse cx="1420" cy="514" rx="8" ry="18" fill="#d8c8a8" />
    <ellipse cx="1445" cy="512" rx="7" ry="20" fill="#c8b898" />
    <ellipse cx="1475" cy="515" rx="9" ry="16" fill="#e0d0b0" />
  </g>

  <!-- Left smaller bookshelf -->
  <rect x="380" y="100" width="220" height="200" fill="url(#shelfWood)" />
  <rect x="380" y="100" width="220" height="200" fill="none" stroke="#2a1a0a" stroke-width="2" />
  <!-- Shelf divide left small -->
  <rect x="380" y="196" width="220" height="5" fill="#2a1a0a" />
  <!-- Books on left small shelf -->
  <g>
    <rect x="390" y="155" width="14" height="39" rx="1" fill="url(#bookBlue)" />
    <rect x="408" y="158" width="18" height="36" rx="1" fill="url(#bookBrown)" />
    <rect x="430" y="152" width="16" height="42" rx="1" fill="url(#bookGreen)" />
    <rect x="452" y="160" width="12" height="34" rx="1" fill="#7a4a3a" />
    <rect x="470" y="154" width="20" height="40" rx="1" fill="url(#bookBlue)" />
    <ellipse cx="510" cy="175" rx="5" ry="12" fill="#d4c4a0" />
    <ellipse cx="530" cy="173" rx="6" ry="14" fill="#e0d0b0" />
  </g>

  <!-- Center writing desk -->
  <g>
    <!-- Desk body -->
    <rect x="620" y="580" width="360" height="120" fill="url(#deskWood)" />
    <!-- Desk top -->
    <rect x="600" y="570" width="400" height="18" rx="3" fill="#7a5a40" />
    <!-- Desk legs -->
    <rect x="610" y="700" width="14" height="60" fill="#4a3020" />
    <rect x="976" y="700" width="14" height="60" fill="#4a3020" />
    <!-- Drawer -->
    <rect x="730" y="630" width="140" height="40" rx="2" fill="#5a3a20" />
    <circle cx="750" cy="650" r="4" fill="#c9a84c" />

    <!-- Ink stone -->
    <rect x="660" y="552" width="40" height="18" rx="3" fill="#1a1a1a" />
    <rect x="662" y="554" width="36" height="6" rx="1" fill="#2a2a2a" />
    <!-- Ink stick -->
    <rect x="710" y="548" width="8" height="22" rx="2" fill="#0a0a0a" />

    <!-- Brush holder -->
    <rect x="840" y="545" width="24" height="28" rx="3" fill="#8a6a4a" />
    <rect x="842" y="548" width="20" height="22" rx="2" fill="#4a3020" />
    <!-- Brushes -->
    <line x1="852" y1="548" x2="848" y2="515" stroke="#8a6a4a" stroke-width="3" stroke-linecap="round" />
    <line x1="850" y1="515" x2="848" y2="512" stroke="#2a2a2a" stroke-width="3" />
    <line x1="856" y1="548" x2="860" y2="510" stroke="#7a5a3a" stroke-width="2.5" stroke-linecap="round" />
    <line x1="859" y1="510" x2="860" y2="508" stroke="#2a2a2a" stroke-width="2.5" />

    <!-- Rice paper on desk -->
    <rect x="670" y="575" width="140" height="100" rx="1" fill="#f0e8d0" opacity="0.8" />
    <rect x="670" y="575" width="140" height="100" rx="1" fill="none" stroke="#d0c8b0" stroke-width="0.5" />
    <!-- Ink strokes on paper -->
    <g fill="none" stroke="#1a1a1a" stroke-width="1.5" opacity="0.3">
      <path d="M690,600 Q720,590 750,610 Q780,630 800,600" />
      <path d="M700,650 L730,620 L760,650" />
    </g>
  </g>

  <!-- Bamboo plant in pot (left foreground) -->
  <g>
    <rect x="120" y="650" width="70" height="70" rx="5" fill="#6a4a3a" />
    <rect x="125" y="655" width="60" height="60" rx="3" fill="#4a3020" />
    <!-- Bamboo stalks -->
    <line x1="155" y1="655" x2="150" y2="300" stroke="#4a7a3a" stroke-width="8" stroke-linecap="round" />
    <line x1="155" y1="400" x2="155" y2="395" stroke="#3a5a2a" stroke-width="2" />
    <line x1="150" y1="350" x2="150" y2="345" stroke="#3a5a2a" stroke-width="2" />
    <!-- Branch -->
    <path d="M150,380 Q120,350 100,320" fill="none" stroke="#4a7a3a" stroke-width="3" />
    <!-- Bamboo leaves -->
    <ellipse cx="100" cy="318" rx="20" ry="4" fill="#5a8a3a" transform="rotate(-30,100,318)" />
    <ellipse cx="95" cy="330" rx="16" ry="3" fill="#4a7a2a" transform="rotate(-15,95,330)" />
    <ellipse cx="110" cy="310" rx="18" ry="3.5" fill="#6a9a4a" transform="rotate(-45,110,310)" />

    <line x1="160" y1="655" x2="165" y2="280" stroke="#3a6a2a" stroke-width="6" stroke-linecap="round" />
    <path d="M165,360 Q190,340 210,310" fill="none" stroke="#3a6a2a" stroke-width="2.5" />
    <ellipse cx="212" cy="308" rx="18" ry="3.5" fill="#4a7a2a" transform="rotate(25,212,308)" />
    <ellipse cx="205" cy="320" rx="15" ry="3" fill="#3a6a1a" transform="rotate(15,205,320)" />
  </g>

  <!-- Sunbeams -->
  <polygon points="60,80 320,80 500,700 200,700" fill="url(#sunbeam1)" />
  <polygon points="100,80 280,80 450,700 250,700" fill="url(#sunbeam2)" />

  <!-- Dust motes in sunbeams -->
  <g fill="#ffe8a0" opacity="0.3">
    <circle cx="250" cy="200" r="2" />
    <circle cx="280" cy="280" r="1.5" />
    <circle cx="220" cy="350" r="2.5" />
    <circle cx="300" cy="420" r="1.5" />
    <circle cx="240" cy="500" r="2" />
    <circle cx="270" cy="550" r="1" />
    <circle cx="210" cy="620" r="2" />
  </g>

  <!-- Wall decoration - calligraphy panel -->
  <g opacity="0.4">
    <rect x="700" y="80" width="200" height="300" rx="2" fill="#f0e8d0" />
    <rect x="700" y="80" width="200" height="300" rx="2" fill="none" stroke="#6a5a3a" stroke-width="2" />
    <!-- Simulated calligraphy strokes -->
    <g fill="none" stroke="#1a1a1a" stroke-width="2" opacity="0.4">
      <path d="M750,150 L730,180 L770,180 L740,220 L780,220" />
      <path d="M760,260 L740,300 L780,300 L750,340" />
    </g>
  </g>

  <!-- Vignette -->
  <rect x="0" y="0" width="1600" height="900" fill="none" stroke="#2a2018" stroke-width="100" opacity="0.3" />
</svg>