<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <filter id="scrollTexture" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="3" result="noise" />
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise" />
      <feBlend in="SourceGraphic" in2="grayNoise" mode="multiply" />
    </filter>
    <filter id="scrollShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#2c2416" flood-opacity="0.3" />
    </filter>
    <linearGradient id="rollerGradTop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8B6914" />
      <stop offset="30%" stop-color="#A07828" />
      <stop offset="50%" stop-color="#c9a84c" />
      <stop offset="70%" stop-color="#A07828" />
      <stop offset="100%" stop-color="#6B5010" />
    </linearGradient>
    <linearGradient id="rollerGradBottom" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6B5010" />
      <stop offset="30%" stop-color="#A07828" />
      <stop offset="50%" stop-color="#c9a84c" />
      <stop offset="70%" stop-color="#A07828" />
      <stop offset="100%" stop-color="#8B6914" />
    </linearGradient>
    <linearGradient id="paperGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5e6c8" />
      <stop offset="50%" stop-color="#ede0c0" />
      <stop offset="100%" stop-color="#e8d5a8" />
    </linearGradient>
    <filter id="paperTex">
      <feTurbulence type="fractalNoise" baseFrequency="0.03" numOctaves="3" result="noise" />
      <feColorMatrix type="saturate" values="0" in="noise" />
      <feBlend in="SourceGraphic" in2="noise" mode="multiply" result="blended" />
    </filter>
  </defs>

  <!-- Shadow -->
  <rect x="20" y="20" width="560" height="360" rx="8" fill="none" filter="url(#scrollShadow)" />

  <!-- Main scroll paper body with slight curve -->
  <g filter="url(#paperTex)">
    <path d="M40,60 Q300,55 560,60 L560,340 Q300,345 40,340 Z" fill="url(#paperGrad)" stroke="#c4a46c" stroke-width="1" />
  </g>

  <!-- Left edge curl hint -->
  <path d="M40,60 Q35,60 37,100 Q36,200 37,300 Q35,340 40,340" fill="none" stroke="#d4b87c" stroke-width="0.5" opacity="0.4" />
  <!-- Right edge curl hint -->
  <path d="M560,60 Q565,60 563,100 Q564,200 563,300 Q565,340 560,340" fill="none" stroke="#d4b87c" stroke-width="0.5" opacity="0.4" />

  <!-- Top roller -->
  <rect x="30" y="42" width="540" height="22" rx="11" fill="url(#rollerGradTop)" />
  <!-- Top roller end caps -->
  <rect x="24" y="40" width="16" height="26" rx="8" fill="#8B6914" />
  <rect x="560" y="40" width="16" height="26" rx="8" fill="#8B6914" />
  <!-- Top roller cap highlights -->
  <rect x="27" y="44" width="10" height="18" rx="5" fill="#A07828" opacity="0.5" />
  <rect x="563" y="44" width="10" height="18" rx="5" fill="#A07828" opacity="0.5" />

  <!-- Bottom roller -->
  <rect x="30" y="336" width="540" height="22" rx="11" fill="url(#rollerGradBottom)" />
  <!-- Bottom roller end caps -->
  <rect x="24" y="334" width="16" height="26" rx="8" fill="#8B6914" />
  <rect x="560" y="334" width="16" height="26" rx="8" fill="#8B6914" />
  <!-- Bottom roller cap highlights -->
  <rect x="27" y="338" width="10" height="18" rx="5" fill="#A07828" opacity="0.5" />
  <rect x="563" y="338" width="10" height="18" rx="5" fill="#A07828" opacity="0.5" />

  <!-- Transparent content area indicator (faint border) -->
  <rect x="50" y="80" width="500" height="240" rx="2" fill="none" stroke="#d4b87c" stroke-width="0.3" opacity="0.3" stroke-dasharray="4,8" />
</svg>