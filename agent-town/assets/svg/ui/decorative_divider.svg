<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 40" width="800" height="40">
  <defs>
    <linearGradient id="lineGrad" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity="0" />
      <stop offset="15%" stop-color="#c9a84c" stop-opacity="0.6" />
      <stop offset="50%" stop-color="#c9a84c" stop-opacity="0.8" />
      <stop offset="85%" stop-color="#c9a84c" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="bambooGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5b6e3a" stop-opacity="0" />
      <stop offset="20%" stop-color="#6b8e3a" stop-opacity="0.5" />
      <stop offset="80%" stop-color="#6b8e3a" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#5b6e3a" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- Vertical thin line -->
  <line x1="400" y1="8" x2="400" y2="32" stroke="#8b7355" stroke-width="0.5" opacity="0.3" />

  <!-- Main horizontal line -->
  <line x1="40" y1="20" x2="760" y2="20" stroke="url(#lineGrad)" stroke-width="0.8" />

  <!-- Double line effect -->
  <line x1="100" y1="21.5" x2="700" y2="21.5" stroke="#c9a84c" stroke-width="0.3" opacity="0.4" />

  <!-- Center diamond -->
  <g transform="translate(400,20)" opacity="0.7">
    <polygon points="0,-5 3,0 0,5 -3,0" fill="#c9a84c" />
    <polygon points="0,-3 2,0 0,3 -2,0" fill="#d4b87c" />
  </g>

  <!-- Left bamboo leaves -->
  <g opacity="0.45">
    <path d="M250,14 Q240,8 235,14" fill="none" stroke="#6b8e3a" stroke-width="1" />
    <path d="M260,16 Q250,4 240,10" fill="none" stroke="#7b9e4a" stroke-width="0.8" />
    <path d="M255,18 Q255,5 245,8" fill="none" stroke="#5b7e2a" stroke-width="0.7" />
    <!-- leaf shapes -->
    <ellipse cx="237" cy="14" rx="4" ry="1.5" fill="#6b8e3a" transform="rotate(-30,237,14)" opacity="0.6" />
    <ellipse cx="245" cy="9" rx="3.5" ry="1.2" fill="#7b9e4a" transform="rotate(-25,245,9)" opacity="0.5" />
  </g>

  <!-- Right bamboo leaves -->
  <g opacity="0.45">
    <path d="M550,14 Q560,8 565,14" fill="none" stroke="#6b8e3a" stroke-width="1" />
    <path d="M540,16 Q550,4 560,10" fill="none" stroke="#7b9e4a" stroke-width="0.8" />
    <path d="M545,18 Q545,5 555,8" fill="none" stroke="#5b7e2a" stroke-width="0.7" />
    <ellipse cx="563" cy="14" rx="4" ry="1.5" fill="#6b8e3a" transform="rotate(30,563,14)" opacity="0.6" />
    <ellipse cx="555" cy="9" rx="3.5" ry="1.2" fill="#7b9e4a" transform="rotate(25,555,9)" opacity="0.5" />
  </g>

  <!-- Cloud swirls -->
  <g opacity="0.3" stroke="#c9a84c" fill="none" stroke-width="0.6">
    <path d="M150,18 Q140,12 145,16 Q150,20 155,16" />
    <path d="M650,18 Q660,12 655,16 Q650,20 645,16" />
  </g>

  <!-- Far left dot -->
  <circle cx="30" cy="20" r="1.5" fill="#c9a84c" opacity="0.4" />
  <!-- Far right dot -->
  <circle cx="770" cy="20" r="1.5" fill="#c9a84c" opacity="0.4" />
</svg>