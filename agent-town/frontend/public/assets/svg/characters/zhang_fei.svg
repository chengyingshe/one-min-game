<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 900">
  <defs>
    <linearGradient id="armorDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a4a50" />
      <stop offset="30%" stop-color="#3a3a40" />
      <stop offset="70%" stop-color="#2a2a30" />
      <stop offset="100%" stop-color="#1a1a20" />
    </linearGradient>
    <linearGradient id="armorHighlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6a6a70" />
      <stop offset="100%" stop-color="#3a3a40" />
    </linearGradient>
    <linearGradient id="leatherGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6a4a2a" />
      <stop offset="100%" stop-color="#4a2a10" />
    </linearGradient>
    <linearGradient id="skinGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0d8b0" />
      <stop offset="100%" stop-color="#d8b890" />
    </linearGradient>
    <linearGradient id="spearGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#888890" />
      <stop offset="40%" stop-color="#aaaab0" />
      <stop offset="60%" stop-color="#888890" />
      <stop offset="100%" stop-color="#666670" />
    </linearGradient>
    <linearGradient id="beardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a1a1a" />
      <stop offset="100%" stop-color="#3a3a3a" />
    </linearGradient>
    <linearGradient id="beltGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6a4a2a" />
      <stop offset="50%" stop-color="#8a6a3a" />
      <stop offset="100%" stop-color="#6a4a2a" />
    </linearGradient>
  </defs>

  <!-- Cape/Cloak behind -->
  <path d="M400,290 Q480,310 500,380 Q520,500 510,620 Q505,700 500,760 L340,760 Q330,700 325,620 Q310,500 320,400 Q325,340 340,310 Q360,290 400,290 Z" fill="#3a2020" />
  <path d="M400,290 Q440,320 450,400 Q460,500 455,600" fill="none" stroke="#4a3030" stroke-width="2" opacity="0.4" />

  <!-- Body / Torso armor -->
  <!-- Heavy chest plate -->
  <path d="M235,290 Q220,330 215,400 Q210,480 220,560 Q225,600 240,620 L360,620 Q375,600 380,560 Q390,480 385,400 Q380,330 365,290 Z" fill="url(#armorDark)" />
  <!-- Chest plate border / rivets -->
  <path d="M235,290 Q220,330 215,400 Q210,480 220,560" fill="none" stroke="#5a5a60" stroke-width="2.5" />
  <path d="M365,290 Q380,330 385,400 Q390,480 380,560" fill="none" stroke="#5a5a60" stroke-width="2.5" />
  <!-- Brass fittings on chest -->
  <ellipse cx="270" cy="350" rx="12" ry="12" fill="#b09030" />
  <ellipse cx="270" cy="350" rx="8" ry="8" fill="#d0a830" />
  <ellipse cx="330" cy="350" rx="12" ry="12" fill="#b09030" />
  <ellipse cx="330" cy="350" rx="8" ry="8" fill="#d0a830" />
  <ellipse cx="300" cy="420" rx="14" ry="10" fill="#b09030" />
  <ellipse cx="300" cy="420" rx="10" ry="6" fill="#d0a830" />

  <!-- Leather strap details -->
  <path d="M240,370 L360,370" stroke="#8a6a3a" stroke-width="3" />
  <path d="M238,450 L362,450" stroke="#8a6a3a" stroke-width="3" />

  <!-- Shoulder guards -->
  <path d="M225,290 Q200,295 195,320 Q190,340 210,345 Q230,340 240,320 Z" fill="url(#armorHighlight)" />
  <path d="M225,290 Q200,295 195,320" fill="none" stroke="#5a5a60" stroke-width="2" />
  <path d="M375,290 Q400,295 405,320 Q410,340 390,345 Q370,340 360,320 Z" fill="url(#armorHighlight)" />
  <path d="M375,290 Q400,295 405,320" fill="none" stroke="#5a5a60" stroke-width="2" />

  <!-- Arms -->
  <!-- Left arm -->
  <path d="M225,330 Q190,370 180,420 Q170,460 175,490" fill="none" stroke="url(#armorDark)" stroke-width="35" stroke-linecap="round" />
  <!-- Left forearm guard -->
  <rect x="165" y="420" width="35" height="50" rx="6" fill="url(#armorHighlight)" />
  <rect x="165" y="420" width="35" height="50" rx="6" fill="none" stroke="#5a5a60" stroke-width="1.5" />
  <!-- Left fist -->
  <circle cx="180" cy="495" r="18" fill="url(#skinGrad)" />
  <path d="M170,495 Q180,488 190,495" fill="none" stroke="#c8a878" stroke-width="2" />

  <!-- Right arm (holding spear) -->
  <path d="M375,340 Q410,380 420,430 Q425,470 430,500" fill="none" stroke="url(#armorDark)" stroke-width="35" stroke-linecap="round" />
  <!-- Right forearm guard -->
  <rect x="405" y="420" width="35" height="55" rx="6" fill="url(#armorHighlight)" />
  <rect x="405" y="420" width="35" height="55" rx="6" fill="none" stroke="#5a5a60" stroke-width="1.5" />

  <!-- Serpent Spear (丈八蛇矛) -->
  <!-- Shaft -->
  <rect x="425" y="120" width="10" height="650" rx="3" fill="#5a4a30" />
  <rect x="425" y="120" width="10" height="650" rx="3" fill="none" stroke="#6a5a40" stroke-width="0.5" />
  <!-- Spear head - serpentine blade -->
  <path d="M430,120 Q435,80 430,40 Q428,20 425,10 Q422,20 420,40 Q415,80 420,120 Z" fill="url(#spearGrad)" />
  <!-- Blade edge highlight -->
  <path d="M430,120 Q435,80 430,40" fill="none" stroke="#ccccd0" stroke-width="1.5" />
  <!-- Blade center line -->
  <line x1="425" y1="115" x2="425" y2="15" stroke="#666670" stroke-width="0.5" />
  <!-- Red tassel at spear base -->
  <ellipse cx="425" cy="125" rx="8" ry="16" fill="#c03020" />
  <ellipse cx="425" cy="130" rx="6" ry="12" fill="#d04030" />
  <!-- Spear butt end -->
  <rect x="423" y="770" width="14" height="15" rx="2" fill="#888890" />

  <!-- Right hand gripping spear -->
  <circle cx="430" cy="480" r="18" fill="url(#skinGrad)" />
  <path d="M420,475 Q428,478 440,475" fill="none" stroke="#c8a878" stroke-width="2" />
  <path d="M420,485 Q428,482 440,485" fill="none" stroke="#c8a878" stroke-width="2" />

  <!-- Belt -->
  <rect x="215" y="610" width="170" height="18" rx="4" fill="url(#beltGrad)" />
  <!-- Belt buckle -->
  <rect x="280" y="607" width="40" height="24" rx="2" fill="#b09030" />
  <rect x="283" y="610" width="34" height="18" rx="1" fill="#d0a830" />

  <!-- Lower armor / tassets -->
  <path d="M235,628 Q230,650 235,680 L260,680 L260,628 Z" fill="url(#armorDark)" />
  <path d="M270,628 L270,680 L300,680 L300,628 Z" fill="url(#armorDark)" />
  <path d="M310,628 L310,680 L340,680 L340,628 Z" fill="url(#armorDark)" />
  <path d="M345,628 Q350,650 365,680 L340,680 L340,628 Z" fill="url(#armorDark)" />
  <!-- Tasset decoration -->
  <g stroke="#5a5a60" stroke-width="1" opacity="0.5">
    <line x1="245" y1="635" x2="250" y2="670" />
    <line x1="258" y1="635" x2="258" y2="670" />
    <line x1="285" y1="635" x2="285" y2="670" />
    <line x1="300" y1="635" x2="300" y2="670" />
    <line x1="325" y1="635" x2="325" y2="670" />
    <line x1="340" y1="635" x2="335" y2="670" />
  </g>

  <!-- Pants -->
  <path d="M230,680 L215,800 Q210,810 230,810 L280,810 L280,680 Z" fill="#2a2a30" />
  <path d="M370,680 L385,800 Q390,810 370,810 L320,810 L320,680 Z" fill="#2a2a30" />

  <!-- Boots -->
  <path d="M215,800 L210,880 Q210,890 230,890 L280,890 L280,800 Z" fill="#1a1a20" />
  <path d="M385,800 L390,880 Q390,890 370,890 L320,890 L320,800 Z" fill="#1a1a20" />
  <!-- Boot buckles -->
  <rect x="220" y="830" width="55" height="6" rx="2" fill="#8a6a3a" />
  <rect x="325" y="830" width="55" height="6" rx="2" fill="#8a6a3a" />

  <!-- Head -->
  <!-- Face base -->
  <ellipse cx="300" cy="180" rx="54" ry="58" fill="url(#skinGrad)" />

  <!-- Headdress (traditional warrior helmet) -->
  <path d="M240,170 Q235,140 250,110 Q270,85 300,80 Q330,85 350,110 Q365,140 360,170" fill="#3a3a40" />
  <path d="M240,170 Q235,140 250,110 Q270,85 300,80 Q330,85 350,110 Q365,140 360,170" fill="none" stroke="#5a5a60" stroke-width="2.5" />
  <!-- Helmet dome -->
  <ellipse cx="300" cy="120" rx="48" ry="35" fill="#4a4a50" />
  <ellipse cx="300" cy="120" rx="48" ry="35" fill="none" stroke="#5a5a60" stroke-width="2" />
  <!-- Helmet plume holder -->
  <rect x="295" y="82" width="10" height="15" rx="2" fill="#b09030" />
  <!-- Helmet crest/plume -->
  <path d="M300,82 Q310,40 340,20 Q360,5 370,15" fill="none" stroke="#c03020" stroke-width="4" stroke-linecap="round" />
  <path d="M298,82 Q295,50 280,25 Q270,10 260,18" fill="none" stroke="#c03020" stroke-width="3" stroke-linecap="round" />

  <!-- Eyebrows (thick, fierce, dark) -->
  <path d="M257,162 Q270,152 290,158 Q295,159 300,160" fill="none" stroke="#0a0a0a" stroke-width="4" stroke-linecap="round" />
  <path d="M343,162 Q330,152 310,158 Q305,159 300,160" fill="none" stroke="#0a0a0a" stroke-width="4" stroke-linecap="round" />

  <!-- Eyes (intense, piercing) -->
  <ellipse cx="280" cy="178" rx="13" ry="7" fill="white" />
  <ellipse cx="320" cy="178" rx="13" ry="7" fill="white" />
  <!-- Dark irises -->
  <ellipse cx="282" cy="178" rx="7" ry="5.5" fill="#1a0a00" />
  <ellipse cx="322" cy="178" rx="7" ry="5.5" fill="#1a0a00" />
  <!-- Pupils -->
  <circle cx="283" cy="178" r="3.5" fill="#000" />
  <circle cx="323" cy="178" r="3.5" fill="#000" />
  <!-- Eye highlights -->
  <circle cx="280" cy="175" r="2" fill="white" />
  <circle cx="320" cy="175" r="2" fill="white" />

  <!-- Nose -->
  <path d="M298,185 L295,200 Q300,203 305,200 L302,185" fill="#d8b890" />
  <ellipse cx="295" cy="200" rx="5" ry="3" fill="#c8a878" />
  <ellipse cx="305" cy="200" rx="5" ry="3" fill="#c8a878" />

  <!-- Beard - short, dark, dense -->
  <path d="M275,205 Q270,220 268,240 Q265,255 270,265" fill="none" stroke="url(#beardGrad)" stroke-width="10" stroke-linecap="round" />
  <path d="M285,210 Q282,230 280,255 Q278,270 282,280" fill="none" stroke="#1a1a1a" stroke-width="8" stroke-linecap="round" />
  <path d="M295,212 Q294,235 293,260 Q292,280 295,290" fill="none" stroke="#1a1a1a" stroke-width="7" stroke-linecap="round" />
  <path d="M305,212 Q306,235 307,260 Q308,280 305,290" fill="none" stroke="#1a1a1a" stroke-width="7" stroke-linecap="round" />
  <path d="M315,210 Q318,230 320,255 Q322,270 318,280" fill="none" stroke="#1a1a1a" stroke-width="8" stroke-linecap="round" />
  <path d="M325,205 Q330,220 332,240 Q335,255 330,265" fill="none" stroke="url(#beardGrad)" stroke-width="10" stroke-linecap="round" />

  <!-- Mustache -->
  <path d="M275,202 Q260,198 250,202" fill="none" stroke="#1a1a1a" stroke-width="5" stroke-linecap="round" />
  <path d="M325,202 Q340,198 350,202" fill="none" stroke="#1a1a1a" stroke-width="5" stroke-linecap="round" />

  <!-- Mouth (hidden under mustache, firm line) -->
  <path d="M288,208 Q300,210 312,208" fill="none" stroke="#8a5030" stroke-width="2" />

  <!-- Cheekbones (strong, defined) -->
  <ellipse cx="260" cy="195" rx="15" ry="8" fill="#d0a878" opacity="0.3" />
  <ellipse cx="340" cy="195" rx="15" ry="8" fill="#d0a878" opacity="0.3" />

  <!-- Neck (thick, powerful) -->
  <rect x="278" y="230" width="44" height="25" fill="url(#skinGrad)" />
  <path d="M270,250 Q300,258 330,250" fill="none" stroke="#c8a878" stroke-width="2" />

  <!-- Helmet ear flaps -->
  <path d="M245,170 Q230,190 235,220 Q240,240 255,235 Q265,225 260,200" fill="#3a3a40" />
  <path d="M355,170 Q370,190 365,220 Q360,240 345,235 Q335,225 340,200" fill="#3a3a40" />

  <!-- Subtle shadow at feet -->
  <ellipse cx="300" cy="895" rx="100" ry="18" fill="#000000" opacity="0.1" />
</svg>