name: wild-survivors
genre: topdown
screen:
  width: 800
  height: 600
  fps: 60

multiplayer:
  enabled: true
  max_players: 4
  min_players: 1
  shared_viewport: true

player:
  hp: 10
  speed: 150.0
  color: [255, 220, 50]

controls: "WASD/Arrows: Move | Space: Attack | E: Wall | R: Campfire"

gameplay:
  objective: survive
  duration: 120

world:
  width: 80
  height: 60
  tile_size: 16

resources:
  tree:
    hp: 3
    color: [34, 139, 34]
    drop: wood
  rock:
    hp: 5
    color: [150, 150, 150]
    drop: stone
  ore:
    hp: 7
    color: [200, 170, 50]
    drop: iron

enemies:
  slime:
    hp: 3
    damage: 1
    speed: 40
    color: [100, 255, 100]
    spawn_rate: 0.02
  skeleton:
    hp: 8
    damage: 2
    speed: 25
    color: [220, 220, 220]
    spawn_rate: 0.008

structures:
  wall:
    hp: 15
    cost_wood: 3
    color: [139, 90, 43]
  campfire:
    hp: 8
    cost_wood: 5
    cost_stone: 2
    color: [255, 140, 0]

difficulty:
  easy:
    enemy_speed: 30
    spawn_rate: 240
    player_hp: 15
    grace_period: 300
  normal:
    enemy_speed: 50
    spawn_rate: 150
    player_hp: 10
    grace_period: 180
  hard:
    enemy_speed: 70
    spawn_rate: 90
    player_hp: 7
    grace_period: 90
